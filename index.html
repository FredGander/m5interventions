<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medtra5 — Interventions</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;overflow:hidden;background:#EDF1F7}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
@keyframes slideIn{from{opacity:0;transform:translateX(-14px)}to{opacity:1;transform:translateX(0)}}
@keyframes popIn{0%{transform:scale(0.5);opacity:0}70%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
.nav-item{width:100%;padding:7px 14px;display:flex;align-items:center;gap:8px;background:transparent;border:none;border-left:3px solid transparent;color:rgba(255,255,255,0.45);font-size:12px;cursor:pointer;text-align:left;font-family:inherit;transition:all 0.1s}
.nav-item:hover{background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.8)}
.nav-item.active{background:rgba(29,106,245,0.2);border-left-color:#3B82F6;color:white;font-weight:600}
.th{padding:8px;font-size:10px;font-weight:700;color:#64748B;text-transform:uppercase;letter-spacing:0.5px;cursor:pointer;user-select:none;display:flex;align-items:center;white-space:nowrap;border-right:1px solid #F1F5F9;flex-shrink:0}
.th:hover{background:#EFF6FF;color:#2563EB}
.td{padding:9px 8px;font-size:12px;color:#374151;display:flex;align-items:center;border-right:1px solid #F8FAFC;overflow:hidden;flex-shrink:0}
.row{display:flex;border-bottom:1px solid #F1F5F9;cursor:pointer;transition:background 0.1s}
.row:hover{background:#EEF4FF!important}
.row.anim{animation:slideIn 0.35s ease both}
select,input{font-family:inherit}
</style>
</head>
<body><div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useMemo, useRef} = React;
const PAGE = 50;

/* ── NAF sections ── */
const SECTIONS = {"01":"Agriculture","02":"Agriculture","03":"Agriculture","05":"Industries extract.","06":"Industries extract.","07":"Industries extract.","08":"Industries extract.","09":"Industries extract.","10":"Industrie alim.","11":"Industrie alim.","12":"Industrie alim.","13":"Textile","14":"Textile","15":"Cuir","16":"Bois","17":"Papier","18":"Imprimerie","19":"Pétrole","20":"Chimie","21":"Pharma","22":"Plastique","23":"Minéraux","24":"Métallurgie","25":"Métal","26":"Électronique","27":"Équip. électrique","28":"Machines","29":"Auto","30":"Autres transp.","31":"Mobilier","32":"Autres manuf.","33":"Réparation","35":"Énergie","36":"Eau","37":"Eau","38":"Eau","39":"Eau","41":"Construction","42":"Construction","43":"Construction","45":"Commerce auto","46":"Commerce gros","47":"Commerce détail","49":"Transport","50":"Transport","51":"Transport","52":"Transport","53":"Transport","55":"Hôtellerie","56":"Restauration","58":"Édition","59":"Audiovisuel","60":"Audiovisuel","61":"Télécoms","62":"Informatique","63":"Services info","64":"Finance","65":"Assurance","66":"Finance","68":"Immobilier","69":"Juridique","70":"Conseil","71":"Ingénierie","72":"Recherche","73":"Pub","74":"Activités spéc.","75":"Vétérinaire","77":"Location","78":"RH","79":"Tourisme","80":"Sécurité","81":"Services bâtiment","82":"Services admin.","84":"Admin. publique","85":"Enseignement","86":"Santé humaine","87":"Héberg. médico-soc.","88":"Action sociale","90":"Arts","91":"Arts","92":"Jeux","93":"Sports","94":"Org. assoc.","95":"Réparation","96":"Autres services","97":"Ménages","98":"Ménages"};
const getSection = code => { if(!code) return null; const d = code.replace('.','').substring(0,2); return SECTIONS[d]||null; };

/* ── Date parsing ── */
const parseDate = s => { if(!s) return 0; const p=s.split('/'); return p.length===3 ? new Date(+p[2],+p[1]-1,+p[0]).getTime() : (new Date(s).getTime()||0); };

/* ── Rank computation ── */
function computeRanks(rows) {
  const r1=[], r2=[];
  rows.forEach(r => {
    const eff = Number(r.effectif)||0;
    const dt = r.dateFE ? parseDate(r.dateFE) : parseDate(r.adhesion);
    if(!dt || eff<=0) return;
    const item = {...r, _eff:eff, _dt:dt, _key:String(r.id)};
    if(eff>2) r1.push(item);
    else if(eff>=1 && eff<=2) r2.push(item);
  });
  const interleave = arr => {
    const nv = arr.filter(r=>r.anciennete==='Nouvel Adh').sort((a,b)=>b._dt-a._dt);
    const an = arr.filter(r=>r.anciennete==='Ancien Adh').sort((a,b)=>a._dt-b._dt);
    const out=[]; let ni=0,ai=0;
    while(ni<nv.length||ai<an.length){
      if(ni<nv.length) out.push(nv[ni++]);
      if(ai<an.length) out.push(an[ai++]);
      if(ai<an.length) out.push(an[ai++]);
    }
    return out;
  };
  const ranks={};
  interleave(r1).forEach((r,i)=>{ ranks[r._key]={r1:i+1,r2:null}; });
  interleave(r2).forEach((r,i)=>{ ranks[r._key]={r1:null,r2:i+1}; });
  return ranks;
}

/* ── Avatar ── */
function Av({name,size=22}){
  if(!name||name==='nan') return null;
  const p=name.trim().split(' ');
  const i=(p[0]?.[0]||'').toUpperCase()+(p[1]?.[0]||'').toUpperCase();
  const h=[210,270,160,30,340,190,220,50][name.charCodeAt(0)%8];
  return <div style={{width:size,height:size,borderRadius:'50%',background:`hsl(${h},55%,40%)`,color:'white',display:'flex',alignItems:'center',justifyContent:'center',fontSize:size*.34,fontWeight:700,flexShrink:0}}>{i}</div>;
}

/* ── Badge rang ── */
function RangBadge({v,color,bg,animKey}){
  if(!v) return <span style={{color:'#CBD5E1'}}>—</span>;
  return <span key={`${animKey}-${v}`} style={{fontWeight:700,color,background:bg,borderRadius:5,padding:'2px 8px',fontSize:11,display:'inline-block',animation:`popIn 0.3s cubic-bezier(.34,1.56,.64,1) ${Math.min(v*15,500)}ms both`}}>{v}</span>;
}

const NAV=['Tableau de bord','Adhérents','Travailleurs','RDVs santé travail','Planning','Interventions','PDP','Demandes','Alertes','Ressources','Eval-Risq','Documents','Statistiques'];

const COLS=[
  {k:'adherent',  label:'Adhérent',   w:190},
  {k:'naf',       label:'NAF',        w:175},
  {k:'adhesion',  label:'Adhésion',   w:82, center:true},
  {k:'medecin',   label:'Médecin',    w:155},
  {k:'effectif',  label:'Effectif',   w:65, center:true},
  {k:'dateFE',    label:'Date FE',    w:82, center:true},
  {k:'anciennete',label:'Anc.',       w:72, center:true},
  {k:'territoire',label:'Territoire', w:105},
  {k:'intervenant',label:'Intervenant',w:135},
  {k:'rang2',     label:'Prio 1-2',   w:72, center:true, hColor:'#9D174D', hBg:'#FCE7F3'},
  {k:'rang1',     label:'Prio >2',    w:72, center:true, hColor:'#1D4ED8', hBg:'#DBEAFE'},
  {k:'_action',   label:'Action',     w:118,center:true},
];
const TW = COLS.reduce((s,c)=>s+c.w,0);

/* ══════════════════════════════════════════════════════ */
function App(){
  const [data,      setData]      = useState([]);
  const [loading,   setLoading]   = useState(true);
  const [nav,       setNav]       = useState('Interventions');
  const [search,    setSearch]    = useState('');
  const [fM,        setFM]        = useState('all');
  const [fT,        setFT]        = useState('all');
  const [fA,        setFA]        = useState('all');
  const [fS,        setFS]        = useState('all');
  const [sortK,     setSortK]     = useState('rang1');
  const [sortD,     setSortD]     = useState('asc');
  const [page,      setPage]      = useState(1);
  const [showF,     setShowF]     = useState(false);
  const [created,   setCreated]   = useState(new Set());
  const [toast,     setToast]     = useState(null);
  const [apiKey,    setApiKey]    = useState(localStorage.getItem('m5key')||'');
  const [showKey,   setShowKey]   = useState(false);
  const [navOpen,   setNavOpen]   = useState(true);
  const [aiOpen,    setAiOpen]    = useState(false);
  const [selRow,    setSelRow]    = useState(null);
  const [msgs,      setMsgs]      = useState([]);
  const [aiInput,   setAiInput]   = useState('');
  const [aiLoad,    setAiLoad]    = useState(false);
  const [animKey,   setAnimKey]   = useState(0);
  const endRef = useRef(null);

  useEffect(()=>{
    fetch('./data.json').then(r=>r.json()).then(d=>{setData(d);setLoading(false);}).catch(()=>setLoading(false));
  },[]);

  useEffect(()=>{ endRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  /* lists for selects */
  const medecins   = useMemo(()=>[...new Set(data.map(r=>r.medecin).filter(m=>m&&m!=='nan'))].sort(),[data]);
  const territoires= useMemo(()=>[...new Set(data.map(r=>r.territoire).filter(t=>t&&t!=='nan'))].sort(),[data]);
  const secteurs   = useMemo(()=>{ const s=new Set(); data.forEach(r=>{const x=getSection(r.nafCode);if(x)s.add(x);}); return [...s].sort(); },[data]);

  /* filtering */
  const base = useMemo(()=>{
    let d=data;
    if(fM!=='all') d=d.filter(r=>r.medecin===fM);
    if(fT!=='all') d=d.filter(r=>r.territoire===fT);
    if(fA!=='all') d=d.filter(r=>r.anciennete===fA);
    if(fS!=='all') d=d.filter(r=>getSection(r.nafCode)===fS);
    if(search.trim()){ const q=search.toLowerCase(); d=d.filter(r=>r.adherent?.toLowerCase().includes(q)||r.medecin?.toLowerCase().includes(q)||r.territoire?.toLowerCase().includes(q)||r.naf?.toLowerCase().includes(q)||r.intervenant?.toLowerCase().includes(q)); }
    return d;
  },[data,fM,fT,fA,fS,search]);

  const anyFilter = fM!=='all'||fT!=='all'||fA!=='all'||fS!=='all'||search.trim()!=='';

  /* dynamic ranks */
  const dynRanks = useMemo(()=>anyFilter ? computeRanks(base) : null,[base,anyFilter]);

  /* trigger animation when dynRanks changes */
  const prevDyn = useRef(null);
  useEffect(()=>{
    if(dynRanks && dynRanks!==prevDyn.current){ setAnimKey(k=>k+1); }
    prevDyn.current = dynRanks;
  },[dynRanks]);

  /* get display rank for a row */
  const getRank = (row,key) => {
    if(dynRanks){ const e=dynRanks[String(row.id)]; return e ? e[key==='rang1'?'r1':'r2'] : null; }
    return row[key];
  };

  /* sorting */
  const rows = useMemo(()=>{
    const dir = sortD==='asc'?1:-1;
    const rankKeys = ['rang1','rang2'];
    return [...base].sort((a,b)=>{
      let av,bv;
      if(rankKeys.includes(sortK)){
        av = getRank(a,sortK); bv = getRank(b,sortK);
        const ae=!av, be=!bv;
        if(ae&&be) return 0; if(ae) return 1; if(be) return -1;
        return (av-bv)*dir;
      }
      av=a[sortK]??''; bv=b[sortK]??'';
      if(typeof av==='string') return av.localeCompare(bv,'fr')*dir;
      return (av-bv)*dir;
    });
  },[base,dynRanks,sortK,sortD]);

  const totalPages = Math.max(1,Math.ceil(rows.length/PAGE));
  const paged = rows.slice((page-1)*PAGE, page*PAGE);
  const nFilters = (fM!=='all'?1:0)+(fT!=='all'?1:0)+(fA!=='all'?1:0)+(fS!=='all'?1:0)+(search?1:0);

  const sort = k => { if(k==='_action') return; setSortK(k); setSortD(p=>k===sortK?(p==='asc'?'desc':'asc'):'asc'); setPage(1); };
  const reset = () => { setFM('all');setFT('all');setFA('all');setFS('all');setSearch('');setPage(1); };
  const toast_ = m => { setToast(m); setTimeout(()=>setToast(null),3000); };
  const create = (row,e) => { e.stopPropagation(); setCreated(p=>new Set([...p,row.id])); toast_(`✓ Créée — ${row.adherent}`); };
  const openAI = row => {
    setSelRow(row); setAiOpen(true);
    setMsgs([{r:'a',c:`Intervention : **${row.adherent}** | ${row.naf}\nPriorité calculée • Effectif : ${row.effectif} • ${row.territoire} • ${row.anciennete}\n\nQue souhaitez-vous analyser ?`}]);
  };
  const sendAI = async() => {
    if(!aiInput.trim()||aiLoad) return;
    if(!apiKey){setShowKey(true);return;}
    const h=[...msgs,{r:'u',c:aiInput}];
    setMsgs(h); setAiInput(''); setAiLoad(true);
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
        headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:600,
          system:`Assistant Medtra5. Contexte: ${selRow?JSON.stringify(selRow):'aucun'}. Total=${data.length}, filtrés=${rows.length}. Réponds en français, concis.`,
          messages:h.map(m=>({role:m.r==='u'?'user':'assistant',content:m.c}))})});
      const d=await res.json();
      setMsgs([...h,{r:'a',c:d.content?.[0]?.text||'Erreur.'}]);
    }catch(e){setMsgs([...h,{r:'a',c:'Erreur de connexion.'}]);}
    setAiLoad(false);
  };

  const Arrow = ({k}) => <span style={{marginLeft:2,opacity:sortK===k?0.8:0.15}}>{sortK===k?(sortD==='asc'?'↑':'↓'):'↕'}</span>;

  const Cell = ({row,col}) => {
    const done=created.has(row.id);
    switch(col.k){
      case 'adherent': return <div style={{minWidth:0}}><div style={{fontWeight:600,color:'#1E293B',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.adherent}</div></div>;
      case 'naf': return <div style={{minWidth:0}}><div style={{fontSize:11.5,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.naf}</div><div style={{fontSize:10,color:'#94A3B8'}}>{row.nafCode}</div></div>;
      case 'adhesion': return <span style={{color:'#64748B',fontSize:11}}>{row.adhesion||'—'}</span>;
      case 'medecin': return <div style={{display:'flex',alignItems:'center',gap:5,minWidth:0}}><Av name={row.medecin} size={20}/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11}}>{row.medecin}</span></div>;
      case 'effectif': return <span style={{fontWeight:500}}>{row.effectif||'—'}</span>;
      case 'dateFE': return <span style={{color:row.dateFE?'#10B981':'#CBD5E1',fontSize:11}}>{row.dateFE||'—'}</span>;
      case 'anciennete': return <span style={{fontSize:10,padding:'2px 6px',borderRadius:4,background:row.anciennete==='Nouvel Adh'?'#EFF6FF':'#F1F5F9',color:row.anciennete==='Nouvel Adh'?'#2563EB':'#64748B',fontWeight:500,whiteSpace:'nowrap'}}>{row.anciennete==='Nouvel Adh'?'Nouveau':'Ancien'}</span>;
      case 'territoire': return <span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{row.territoire||'—'}</span>;
      case 'intervenant': return <div style={{display:'flex',alignItems:'center',gap:5,minWidth:0}}><Av name={row.intervenant} size={18}/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:11,color:'#64748B'}}>{row.intervenant||'—'}</span></div>;
      case 'rang1': return <RangBadge v={getRank(row,'rang1')} color='#1D4ED8' bg='#DBEAFE' animKey={animKey}/>;
      case 'rang2': return <RangBadge v={getRank(row,'rang2')} color='#9D174D' bg='#FCE7F3' animKey={animKey}/>;
      case '_action': return <button onClick={e=>create(row,e)} style={{padding:'4px 8px',borderRadius:5,border:`1px solid ${done?'#86EFAC':'#E2E8F0'}`,background:done?'#F0FDF4':'white',color:done?'#15803D':'#64748B',fontSize:10.5,cursor:'pointer',whiteSpace:'nowrap',fontFamily:'inherit'}}>{done?'✓ Créée':'Créer l\'intervention'}</button>;
      default: return <span>{String(row[col.k]||'—')}</span>;
    }
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

      {/* SIDEBAR */}
      {navOpen && <div style={{width:188,background:'#0B2040',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'13px 14px',borderBottom:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',gap:8}}>
          <div style={{width:30,height:30,borderRadius:7,background:'#1D6AF5',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" fill="white"/><path d="M5 21c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="white" strokeWidth="2.2" strokeLinecap="round"/></svg>
          </div>
          <div style={{flex:1}}><div style={{color:'white',fontWeight:700,fontSize:14}}>medtra<span style={{color:'#60A5FA'}}>5</span></div><div style={{color:'rgba(255,255,255,0.3)',fontSize:9,letterSpacing:'0.7px',textTransform:'uppercase'}}>Santé au travail</div></div>
          <button onClick={()=>setNavOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.25)',fontSize:14,lineHeight:1}}>‹</button>
        </div>
        <nav style={{flex:1,padding:'5px 0',overflowY:'auto'}}>
          {NAV.map(l=><button key={l} className={`nav-item${l===nav?' active':''}`} onClick={()=>setNav(l)}>{l}</button>)}
        </nav>
        <div style={{padding:'10px 14px',borderTop:'1px solid rgba(255,255,255,0.06)',display:'flex',alignItems:'center',gap:8}}>
          <Av name="Elise Moreau" size={26}/><div><div style={{color:'white',fontSize:11,fontWeight:600}}>Élise Moreau</div><div style={{color:'rgba(255,255,255,0.35)',fontSize:10}}>Médecin</div></div>
        </div>
      </div>}

      {/* MAIN */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>

        {/* TOPBAR */}
        <div style={{height:48,background:'#0B2040',display:'flex',alignItems:'center',padding:'0 14px',gap:10,flexShrink:0,borderBottom:'1px solid rgba(255,255,255,0.06)'}}>
          {!navOpen && <button onClick={()=>setNavOpen(true)} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.5)',fontSize:18}}>☰</button>}
          <div style={{display:'flex',alignItems:'center',gap:7,background:'rgba(255,255,255,0.07)',borderRadius:7,padding:'5px 10px',flex:1,maxWidth:340}}>
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Rechercher…" style={{background:'none',border:'none',outline:'none',color:'rgba(255,255,255,0.85)',fontSize:12,flex:1,fontFamily:'inherit'}}/>
            {search && <button onClick={()=>{setSearch('');setPage(1);}} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.4)',fontSize:13}}>✕</button>}
          </div>
          <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8}}>
            <button onClick={()=>setShowKey(v=>!v)} style={{background:'none',border:'none',cursor:'pointer',fontSize:15,opacity:0.6}}>⚙️</button>
            <Av name="Elise Moreau" size={27}/>
          </div>
        </div>

        {/* API KEY */}
        {showKey && <div style={{background:'#1E3A5F',padding:'8px 14px',display:'flex',alignItems:'center',gap:8,borderBottom:'1px solid rgba(255,255,255,0.1)',flexShrink:0}}>
          <span style={{color:'rgba(255,255,255,0.7)',fontSize:12,whiteSpace:'nowrap'}}>🔑 Clé API :</span>
          <input id="kInput" defaultValue={apiKey} type="password" placeholder="sk-ant-..." style={{flex:1,background:'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',borderRadius:6,padding:'4px 10px',color:'white',fontSize:12,outline:'none',fontFamily:'monospace'}}/>
          <button onClick={()=>{const k=document.getElementById('kInput').value;setApiKey(k);localStorage.setItem('m5key',k);setShowKey(false);toast_('✓ Clé enregistrée');}} style={{padding:'4px 12px',background:'#1D6AF5',border:'none',borderRadius:6,color:'white',cursor:'pointer',fontSize:12,fontWeight:600}}>OK</button>
          <button onClick={()=>setShowKey(false)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',cursor:'pointer',fontSize:16}}>✕</button>
        </div>}

        <div style={{flex:1,overflow:'auto',padding:12}}>
          <div style={{background:'white',borderRadius:10,border:'1px solid #E2E8F0',overflow:'hidden'}}>

            {/* TOOLBAR */}
            <div style={{display:'flex',alignItems:'center',padding:'9px 14px',borderBottom:'1px solid #F1F5F9',gap:8,flexWrap:'wrap'}}>
              <button onClick={()=>setShowF(v=>!v)} style={{display:'flex',alignItems:'center',gap:5,padding:'5px 10px',borderRadius:6,border:`1px solid ${showF||nFilters?'#BFDBFE':'#E2E8F0'}`,background:showF||nFilters?'#EFF6FF':'white',color:showF||nFilters?'#2563EB':'#64748B',cursor:'pointer',fontSize:12,fontWeight:500,fontFamily:'inherit'}}>
                ⚙ Filtres {nFilters>0 && <span style={{background:'#3B82F6',color:'white',borderRadius:'50%',width:15,height:15,fontSize:9,display:'inline-flex',alignItems:'center',justifyContent:'center',fontWeight:700}}>{nFilters}</span>}
              </button>
              <span style={{fontSize:12,color:'#94A3B8'}}><b style={{color:'#374151'}}>{rows.length.toLocaleString()}</b> / {data.length.toLocaleString()} interventions</span>
              <div style={{marginLeft:'auto'}}>
                <button onClick={()=>{setSelRow(null);setAiOpen(true);setMsgs([{r:'a',c:'Bonjour ! Posez vos questions sur les interventions ou la priorisation.'}]);}} style={{display:'flex',alignItems:'center',gap:6,padding:'5px 12px',borderRadius:7,background:'#1D6AF5',border:'none',color:'white',cursor:'pointer',fontSize:12,fontWeight:600,fontFamily:'inherit'}}>✨ Assistant IA</button>
              </div>
            </div>

            {/* FILTERS */}
            {showF && <div style={{display:'flex',gap:8,padding:'8px 14px',borderBottom:'1px solid #F1F5F9',background:'#FAFBFC',flexWrap:'wrap',alignItems:'center'}}>
              {[
                {val:fT, set:v=>{setFT(v);setPage(1);}, opts:territoires, label:'Tous territoires'},
                {val:fM, set:v=>{setFM(v);setPage(1);}, opts:medecins, label:'Tous médecins'},
                {val:fA, set:v=>{setFA(v);setPage(1);}, opts:['Nouvel Adh','Ancien Adh'], label:'Toute ancienneté'},
                {val:fS, set:v=>{setFS(v);setPage(1);}, opts:secteurs, label:'Tous secteurs'},
              ].map(({val,set,opts,label})=>(
                <select key={label} value={val} onChange={e=>set(e.target.value)} style={{padding:'4px 8px',borderRadius:6,border:`1px solid ${val!=='all'?'#BFDBFE':'#E2E8F0'}`,fontSize:12,color:val!=='all'?'#1D4ED8':'#475569',background:val!=='all'?'#EFF6FF':'white',outline:'none',fontWeight:val!=='all'?600:400}}>
                  <option value="all">{label}</option>
                  {opts.map(o=><option key={o} value={o}>{o}</option>)}
                </select>
              ))}
              {nFilters>0 && <button onClick={reset} style={{padding:'4px 10px',borderRadius:6,border:'1px solid #FECACA',fontSize:12,color:'#DC2626',background:'#FEF2F2',cursor:'pointer',fontFamily:'inherit'}}>✕ Réinitialiser</button>}
            </div>}

            {/* TABLE */}
            <div style={{overflowX:'auto',overflowY:'auto',maxHeight:'calc(100vh - 200px)'}}>
              <div style={{minWidth:TW+'px'}}>
                {/* HEAD */}
                <div style={{display:'flex',background:'#F8FAFC',borderBottom:'2px solid #E2E8F0',position:'sticky',top:0,zIndex:10}}>
                  {COLS.map(col=>(
                    <div key={col.k} className="th" onClick={()=>sort(col.k)} style={{width:col.w,justifyContent:col.center?'center':'flex-start',color:col.hColor,background:col.hBg}}>
                      {col.label}{col.k!=='_action'&&<Arrow k={col.k}/>}
                    </div>
                  ))}
                </div>
                {/* BODY */}
                {loading ? <div style={{padding:50,textAlign:'center',color:'#94A3B8'}}>Chargement…</div>
                 : paged.length===0 ? <div style={{padding:40,textAlign:'center',color:'#94A3B8'}}>Aucun résultat</div>
                 : paged.map((row,idx)=>(
                  <div key={String(row.id)} className="row" onClick={()=>openAI(row)}
                    style={{background:idx%2===0?'white':'#FAFBFC', animation:anyFilter?`slideIn 0.32s ease ${Math.min(idx*18,450)}ms both`:'none'}}>
                    {COLS.map(col=>(
                      <div key={col.k} className="td" style={{width:col.w,justifyContent:col.center?'center':'flex-start'}} onClick={col.k==='_action'?e=>e.stopPropagation():undefined}>
                        <Cell row={row} col={col}/>
                      </div>
                    ))}
                  </div>
                ))}
              </div>
            </div>

            {/* PAGINATION */}
            {totalPages>1 && <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 14px',borderTop:'1px solid #F1F5F9',background:'#FAFBFC'}}>
              <span style={{fontSize:12,color:'#94A3B8'}}>Page {page} / {totalPages} — {rows.length.toLocaleString()} résultats</span>
              <div style={{display:'flex',gap:4}}>
                {[['«',()=>setPage(1),page===1],['‹',()=>setPage(p=>Math.max(1,p-1)),page===1],['›',()=>setPage(p=>Math.min(totalPages,p+1)),page===totalPages],['»',()=>setPage(totalPages),page===totalPages]].map(([l,a,dis])=>(
                  <button key={l} onClick={a} disabled={dis} style={{padding:'4px 9px',borderRadius:5,border:'1px solid #E2E8F0',background:dis?'#F8FAFC':'white',color:dis?'#CBD5E1':'#475569',cursor:dis?'default':'pointer',fontSize:13,fontFamily:'inherit'}}>{l}</button>
                ))}
                {[...Array(Math.min(5,totalPages))].map((_,i)=>{
                  const p=Math.max(1,Math.min(totalPages-4,page-2))+i;
                  if(p<1||p>totalPages) return null;
                  return <button key={p} onClick={()=>setPage(p)} style={{padding:'4px 8px',borderRadius:5,border:'1px solid',borderColor:p===page?'#3B82F6':'#E2E8F0',background:p===page?'#3B82F6':'white',color:p===page?'white':'#475569',cursor:'pointer',fontSize:12,fontWeight:p===page?600:400,fontFamily:'inherit'}}>{p}</button>;
                })}
              </div>
            </div>}
          </div>
        </div>
      </div>

      {/* AI PANEL */}
      {aiOpen && <div style={{width:300,background:'white',borderLeft:'1px solid #E2E8F0',display:'flex',flexDirection:'column',flexShrink:0}}>
        <div style={{padding:'11px 14px',background:'#1D6AF5',display:'flex',alignItems:'center',gap:10}}>
          <span style={{fontSize:16}}>✨</span>
          <div style={{flex:1,minWidth:0}}><div style={{color:'white',fontWeight:700,fontSize:13}}>Assistant IA</div>{selRow&&<div style={{color:'rgba(255,255,255,0.65)',fontSize:10,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{selRow.adherent}</div>}</div>
          <button onClick={()=>setAiOpen(false)} style={{background:'none',border:'none',cursor:'pointer',color:'rgba(255,255,255,0.7)',fontSize:18,lineHeight:1}}>✕</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:11,display:'flex',flexDirection:'column',gap:8}}>
          {!apiKey && <div style={{background:'#FEF3C7',border:'1px solid #FDE68A',borderRadius:8,padding:'8px 10px',fontSize:11,color:'#92400E'}}>⚠️ Configurez la clé API via ⚙️</div>}
          {msgs.map((m,i)=>(
            <div key={i} style={{display:'flex',justifyContent:m.r==='u'?'flex-end':'flex-start'}}>
              <div style={{maxWidth:'90%',padding:'8px 11px',borderRadius:10,background:m.r==='u'?'#1D6AF5':'#F1F5F9',color:m.r==='u'?'white':'#374151',fontSize:12,lineHeight:1.6,whiteSpace:'pre-wrap',borderBottomRightRadius:m.r==='u'?3:10,borderBottomLeftRadius:m.r==='a'?3:10}}>{m.c.replace(/\*\*/g,'')}</div>
            </div>
          ))}
          {aiLoad && <div style={{padding:'8px 12px',borderRadius:10,background:'#F1F5F9',fontSize:12,color:'#94A3B8',alignSelf:'flex-start'}}>En réflexion…</div>}
          <div ref={endRef}/>
        </div>
        <div style={{padding:'9px 11px',borderTop:'1px solid #F1F5F9'}}>
          <div style={{display:'flex',gap:6,alignItems:'flex-end',background:'#F8FAFC',borderRadius:10,padding:'7px 10px',border:'1px solid #E2E8F0'}}>
            <textarea value={aiInput} onChange={e=>setAiInput(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendAI();}}} placeholder="Votre question…" rows={1} style={{flex:1,background:'none',border:'none',outline:'none',fontSize:12,color:'#374151',resize:'none',fontFamily:'inherit',lineHeight:1.5}}/>
            <button onClick={sendAI} disabled={aiLoad||!aiInput.trim()} style={{width:27,height:27,borderRadius:6,background:aiInput.trim()?'#1D6AF5':'#E2E8F0',border:'none',cursor:aiInput.trim()?'pointer':'default',color:'white',fontSize:13,flexShrink:0,fontFamily:'inherit'}}>➤</button>
          </div>
        </div>
      </div>}

      {toast && <div style={{position:'fixed',bottom:20,left:'50%',transform:'translateX(-50%)',background:'#1E293B',color:'white',padding:'10px 18px',borderRadius:8,fontSize:13,fontWeight:500,zIndex:1000,whiteSpace:'nowrap'}}>{toast}</div>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
