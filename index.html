<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Medtra5 — Priorisation des interventions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans','Segoe UI',sans-serif;overflow:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:2px}
::-webkit-scrollbar-track{background:transparent}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.nav-btn:hover{background:rgba(255,255,255,0.07)!important;color:rgba(255,255,255,0.85)!important}
.row-hover:hover{background:#EEF4FF!important;cursor:pointer}
.btn-create:hover{background:#F8FAFF!important;border-color:#BFDBFE!important;color:#1D4ED8!important}
.spin{animation:spin 1s linear infinite}
.ai-panel{animation:slideIn 0.2s ease-out}
input::placeholder{color:rgba(255,255,255,0.35)}
textarea::placeholder{color:#94A3B8}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useMemo}=React;

const PRIO={1:{bg:"#FEE2E2",color:"#B91C1C",label:"Urgent"},2:{bg:"#FEF3C7",color:"#B45309",label:"Prioritaire"},3:{bg:"#DCFCE7",color:"#15803D",label:"Planifié"}};
const PAGE_SIZE=50;
const NAV=["Tableau de bord","Adhérents","Travailleurs","RDVs santé travail","Planning","Interventions","PDP","Demandes","Alertes","Ressources","Eval-Risq","Documents","Statistiques"];

function Avatar({name,size=26}){
  if(!name||name==="nan")return null;
  const parts=name.trim().split(" ");
  const init=(parts[0]?.[0]||(parts[1]?.[0]||"?")).toUpperCase()+(parts[1]?.[0]||"").toUpperCase();
  const hues=[210,270,160,30,340,190,220,50,300,170];
  const h=hues[name.charCodeAt(0)%hues.length];
  return <div style={{width:size,height:size,borderRadius:"50%",background:`hsl(${h},55%,40%)`,color:"white",display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.34,fontWeight:700,flexShrink:0,letterSpacing:"-0.5px"}}>{init}</div>;
}

function App(){
  const [data,setData]=useState([]);
  const [loading,setLoading]=useState(true);
  const [activeNav,setActiveNav]=useState("Interventions");
  const [filterM,setFilterM]=useState("all");
  const [filterT,setFilterT]=useState("all");
  const [filterP,setFilterP]=useState("all");
  const [filterA,setFilterA]=useState("all");
  const [search,setSearch]=useState("");
  const [sortKey,setSortKey]=useState("rang1");
  const [sortDir,setSortDir]=useState("asc");
  const [page,setPage]=useState(1);
  const [showFilters,setShowFilters]=useState(false);
  const [aiOpen,setAiOpen]=useState(false);
  const [selRow,setSelRow]=useState(null);
  const [msgs,setMsgs]=useState([]);
  const [input,setInput]=useState("");
  const [aiLoading,setAiLoading]=useState(false);
  const [created,setCreated]=useState(new Set());
  const [toast,setToast]=useState(null);
  const [apiKey,setApiKey]=useState(localStorage.getItem("medtra5_apikey")||"");
  const [showKeyInput,setShowKeyInput]=useState(false);
  const [navOpen,setNavOpen]=useState(true);
  const endRef=useRef(null);

  useEffect(()=>{
    fetch('./data.json')
      .then(r=>r.json())
      .then(d=>{setData(d);setLoading(false);})
      .catch(()=>setLoading(false));
  },[]);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);

  const medecins=useMemo(()=>["all",...[...new Set(data.map(r=>r.medecin).filter(m=>m&&m!=="nan"))].sort()]  ,[data]);
  const territoires=useMemo(()=>["all",...[...new Set(data.map(r=>r.territoire).filter(t=>t&&t!=="nan"))].sort()],[data]);

  const filtered=useMemo(()=>{
    let d=data;
    if(filterM!=="all")d=d.filter(r=>r.medecin===filterM);
    if(filterT!=="all")d=d.filter(r=>r.territoire===filterT);
    if(filterP!=="all")d=d.filter(r=>r.priorite===+filterP);
    if(filterA!=="all")d=d.filter(r=>r.anciennete===filterA);
    if(search.trim()){
      const q=search.toLowerCase();
      d=d.filter(r=>r.adherent?.toLowerCase().includes(q)||r.medecin?.toLowerCase().includes(q)||r.territoire?.toLowerCase().includes(q)||r.naf?.toLowerCase().includes(q));
    }
    const dir=sortDir==="asc"?1:-1;
    d=[...d].sort((a,b)=>{
      const av=a[sortKey]??0, bv=b[sortKey]??0;
      if(typeof av==="string")return av.localeCompare(bv)*dir;
      return(av-bv)*dir;
    });
    return d;
  },[data,filterM,filterT,filterP,filterA,search,sortKey,sortDir]);

  const totalPages=Math.ceil(filtered.length/PAGE_SIZE);
  const paged=filtered.slice((page-1)*PAGE_SIZE,page*PAGE_SIZE);

  const statsP={1:data.filter(r=>r.priorite===1).length,2:data.filter(r=>r.priorite===2).length,3:data.filter(r=>r.priorite===3).length};

  const handleSort=(key)=>{if(sortKey===key)setSortDir(d=>d==="asc"?"desc":"asc");else{setSortKey(key);setSortDir("asc");}setPage(1);};
  const resetFilters=()=>{setFilterM("all");setFilterT("all");setFilterP("all");setFilterA("all");setSearch("");setPage(1);};
  const showToast=(m)=>{setToast(m);setTimeout(()=>setToast(null),3000)};
  const saveKey=(k)=>{setApiKey(k);localStorage.setItem("medtra5_apikey",k);setShowKeyInput(false);showToast("✓ Clé API enregistrée");};

  const openAI=(row)=>{
    setSelRow(row);setAiOpen(true);
    setMsgs([{role:"assistant",content:`Intervention sélectionnée :\n• ${row.adherent} (${row.naf})\n• Priorité ${row.priorite} – ${PRIO[row.priorite].label}\n• Effectif : ${row.effectif} | Territoire : ${row.territoire} | ${row.anciennete}\n\nQue souhaitez-vous savoir ?`}]);
  };

  const sendAI=async()=>{
    if(!input.trim()||aiLoading)return;
    if(!apiKey){setShowKeyInput(true);return;}
    const uMsg={role:"user",content:input};
    const history=[...msgs,uMsg];
    setMsgs(history);setInput("");setAiLoading(true);
    const ctx=selRow?`Intervention: ${JSON.stringify(selRow)}.`:""
    const stats=`Total: ${data.length}, P1: ${statsP[1]}, P2: ${statsP[2]}, P3: ${statsP[3]}. Filtrés: ${filtered.length}.`;
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",max_tokens:600,
          system:`Assistant IA Medtra5 (médecine du travail). ${ctx} Stats: ${stats}. P1=urgent (rang≤5), P2=prioritaire (rang≤15), P3=planifié. Répondez en français, de façon concise et professionnelle.`,
          messages:history.map(m=>({role:m.role,content:m.content})),
        })
      });
      const d=await r.json();
      setMsgs([...history,{role:"assistant",content:d.content?.[0]?.text||"Erreur."}]);
    }catch{setMsgs([...history,{role:"assistant",content:"Erreur de connexion."}]);}
    setAiLoading(false);
  };

  const SortArrow=({k})=>sortKey===k?<span style={{marginLeft:3,opacity:0.7}}>{sortDir==="asc"?"↑":"↓"}</span>:<span style={{marginLeft:3,opacity:0.2}}>↕</span>;

  const activeFiltersCount=(filterM!=="all"?1:0)+(filterT!=="all"?1:0)+(filterP!=="all"?1:0)+(filterA!=="all"?1:0)+(search?1:0);

  return(
    <div style={{display:"flex",height:"100vh",overflow:"hidden",fontFamily:"'DM Sans','Segoe UI',sans-serif",background:"#EDF1F7"}}>

      {/* SIDEBAR */}
      {navOpen&&<div style={{width:190,height:"100vh",background:"#0B2040",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"13px 14px",borderBottom:"1px solid rgba(255,255,255,0.06)",display:"flex",alignItems:"center",gap:8}}>
          <div style={{width:32,height:32,borderRadius:8,background:"#1D6AF5",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="3.5" fill="white"/><path d="M5 21c0-3.866 3.134-7 7-7s7 3.134 7 7" stroke="white" strokeWidth="2.2" strokeLinecap="round"/></svg>
          </div>
          <div><div style={{color:"white",fontWeight:700,fontSize:15,letterSpacing:"-0.3px"}}>medtra<span style={{color:"#60A5FA"}}>5</span></div><div style={{color:"rgba(255,255,255,0.3)",fontSize:9,letterSpacing:"0.8px",textTransform:"uppercase"}}>Santé au travail</div></div>
          <button onClick={()=>setNavOpen(false)} style={{marginLeft:"auto",background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.3)",fontSize:16,lineHeight:1}}>‹</button>
        </div>
        <nav style={{flex:1,padding:"6px 0",overflowY:"auto"}}>
          {NAV.map(label=>{const on=label===activeNav;return(
            <button key={label} className="nav-btn" onClick={()=>setActiveNav(label)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 14px",background:on?"rgba(29,106,245,0.2)":"transparent",borderLeft:`3px solid ${on?"#3B82F6":"transparent"}`,color:on?"white":"rgba(255,255,255,0.45)",border:"none",cursor:"pointer",textAlign:"left",fontSize:12,fontWeight:on?600:400,transition:"all 0.1s"}}>{label}</button>
          );})}
        </nav>
        <div style={{padding:"10px 14px",borderTop:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Avatar name="Elise Moreau" size={26}/>
            <div><div style={{color:"white",fontSize:11,fontWeight:600}}>Élise Moreau</div><div style={{color:"rgba(255,255,255,0.35)",fontSize:10}}>Médecin</div></div>
          </div>
        </div>
      </div>}

      {/* MAIN */}
      <div style={{flex:1,display:"flex",flexDirection:"column",overflow:"hidden"}}>
        {/* TOPBAR */}
        <div style={{height:50,background:"#0B2040",display:"flex",alignItems:"center",padding:"0 14px",gap:10,flexShrink:0,borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
          {!navOpen&&<button onClick={()=>setNavOpen(true)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:20,lineHeight:1,marginRight:4}}>☰</button>}
          <div style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.07)",borderRadius:7,padding:"5px 10px",flex:1,maxWidth:320}}>
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input value={search} onChange={e=>{setSearch(e.target.value);setPage(1);}} placeholder="Rechercher adhérent, médecin…" style={{background:"none",border:"none",outline:"none",color:"rgba(255,255,255,0.85)",fontSize:12.5,flex:1,fontFamily:"inherit"}}/>
            {search&&<button onClick={()=>{setSearch("");setPage(1);}} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.4)",fontSize:14}}>✕</button>}
          </div>
          <div style={{marginLeft:"auto",display:"flex",alignItems:"center",gap:8}}>
            <button onClick={()=>setShowKeyInput(!showKeyInput)} title="Clé API" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,opacity:0.55}}>⚙️</button>
            <Avatar name="Elise Moreau" size={28}/>
          </div>
        </div>

        {/* API KEY BAR */}
        {showKeyInput&&<div style={{background:"#1E3A5F",padding:"8px 14px",display:"flex",alignItems:"center",gap:8,borderBottom:"1px solid rgba(255,255,255,0.1)",flexShrink:0}}>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:12,whiteSpace:"nowrap"}}>🔑 Clé API :</span>
          <input defaultValue={apiKey} id="apiKeyInput" type="password" placeholder="sk-ant-..." style={{flex:1,background:"rgba(255,255,255,0.1)",border:"1px solid rgba(255,255,255,0.2)",borderRadius:6,padding:"4px 10px",color:"white",fontSize:12,outline:"none",fontFamily:"monospace"}}/>
          <button onClick={()=>saveKey(document.getElementById("apiKeyInput").value)} style={{padding:"4px 12px",background:"#1D6AF5",border:"none",borderRadius:6,color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>Enregistrer</button>
          <button onClick={()=>setShowKeyInput(false)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",cursor:"pointer",fontSize:16}}>✕</button>
        </div>}

        <div style={{flex:1,overflow:"auto",padding:12}}>
          {/* KPI */}
          <div style={{display:"flex",gap:10,marginBottom:12}}>
            {[{l:"Total interventions",v:data.length,c:"#3B82F6",filter:null},{l:"Urgentes — P1",v:statsP[1],c:"#B91C1C",filter:"1"},{l:"Prioritaires — P2",v:statsP[2],c:"#B45309",filter:"2"},{l:"Planifiées — P3",v:statsP[3],c:"#15803D",filter:"3"}].map(({l,v,c,filter})=>(
              <div key={l} onClick={()=>{if(filter){setFilterP(filterP===filter?"all":filter);setPage(1);}}} style={{flex:1,background:"white",borderRadius:8,padding:"10px 14px",border:`1px solid ${filterP===filter?"#BFDBFE":"#E2E8F0"}`,cursor:filter?"pointer":"default",transition:"all 0.15s"}}>
                <div style={{fontSize:10.5,color:"#94A3B8",marginBottom:3}}>{l}</div>
                <div style={{fontSize:22,fontWeight:700,color:c}}>{loading?"…":v}</div>
              </div>
            ))}
          </div>

          {/* TABLE CARD */}
          <div style={{background:"white",borderRadius:10,border:"1px solid #E2E8F0",overflow:"hidden"}}>
            {/* TOOLBAR */}
            <div style={{display:"flex",alignItems:"center",padding:"9px 14px",borderBottom:"1px solid #F1F5F9",gap:8,flexWrap:"wrap"}}>
              <button onClick={()=>setShowFilters(!showFilters)} style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:6,border:`1px solid ${showFilters||activeFiltersCount?"#BFDBFE":"#E2E8F0"}`,background:showFilters||activeFiltersCount?"#EFF6FF":"white",color:showFilters||activeFiltersCount?"#2563EB":"#64748B",cursor:"pointer",fontSize:12,fontWeight:500}}>
                ⚙ Filtres {activeFiltersCount>0&&<span style={{background:"#3B82F6",color:"white",borderRadius:"50%",width:15,height:15,fontSize:9,display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>{activeFiltersCount}</span>}
              </button>
              <span style={{fontSize:12,color:"#94A3B8"}}><b style={{color:"#374151"}}>{filtered.length.toLocaleString()}</b> / {data.length.toLocaleString()} interventions</span>
              <div style={{marginLeft:"auto",display:"flex",gap:6,alignItems:"center"}}>
                <button onClick={()=>{setSelRow(null);setAiOpen(true);setMsgs([]);}} style={{display:"flex",alignItems:"center",gap:6,padding:"5px 12px",borderRadius:7,background:"#1D6AF5",border:"none",color:"white",cursor:"pointer",fontSize:12,fontWeight:600}}>✨ Assistant IA</button>
              </div>
            </div>

            {/* FILTERS */}
            {showFilters&&<div style={{display:"flex",gap:8,padding:"8px 14px",borderBottom:"1px solid #F1F5F9",background:"#FAFBFC",flexWrap:"wrap",alignItems:"center"}}>
              <select value={filterP} onChange={e=>{setFilterP(e.target.value);setPage(1);}} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:12,color:"#475569",background:"white",outline:"none"}}>
                <option value="all">Toutes priorités</option>
                <option value="1">🔴 P1 – Urgent</option>
                <option value="2">🟡 P2 – Prioritaire</option>
                <option value="3">🟢 P3 – Planifié</option>
              </select>
              <select value={filterT} onChange={e=>{setFilterT(e.target.value);setPage(1);}} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:12,color:"#475569",background:"white",outline:"none"}}>
                <option value="all">Tous territoires</option>
                {territoires.filter(t=>t!=="all").map(t=><option key={t} value={t}>{t}</option>)}
              </select>
              <select value={filterM} onChange={e=>{setFilterM(e.target.value);setPage(1);}} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:12,color:"#475569",background:"white",outline:"none"}}>
                <option value="all">Tous médecins</option>
                {medecins.filter(m=>m!=="all").map(m=><option key={m} value={m}>{m}</option>)}
              </select>
              <select value={filterA} onChange={e=>{setFilterA(e.target.value);setPage(1);}} style={{padding:"4px 8px",borderRadius:6,border:"1px solid #E2E8F0",fontSize:12,color:"#475569",background:"white",outline:"none"}}>
                <option value="all">Ancienneté</option>
                <option value="Nouvel Adh">Nouvel adhérent</option>
                <option value="Ancien Adh">Ancien adhérent</option>
              </select>
              {activeFiltersCount>0&&<button onClick={resetFilters} style={{padding:"4px 10px",borderRadius:6,border:"1px solid #FECACA",fontSize:12,color:"#DC2626",background:"#FEF2F2",cursor:"pointer"}}>✕ Réinitialiser</button>}
            </div>}

            {/* TABLE */}
            <div style={{overflowX:"auto"}}>
              <div style={{minWidth:820}}>
                {/* HEADER */}
                <div style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 55px 160px 88px 130px",padding:"0 14px",background:"#F8FAFC",borderBottom:"1px solid #E2E8F0"}}>
                  {[{l:"Rg",k:"rang1"},{l:"Adhérent",k:"adherent"},{l:"Effectif",k:"effectif"},{l:"Ancienneté",k:"anciennete"},{l:"Médecin",k:"medecin"},{l:"Territoire",k:"territoire"},{l:"Priorité",k:"priorite"}].map(({l,k})=>(
                    <div key={k} onClick={()=>handleSort(k)} style={{padding:"8px 5px",fontSize:10,fontWeight:700,color:"#64748B",textTransform:"uppercase",letterSpacing:"0.5px",cursor:"pointer",userSelect:"none",display:"flex",alignItems:"center"}}>
                      {l}<SortArrow k={k}/>
                    </div>
                  ))}
                </div>

                {/* ROWS */}
                {loading?<div style={{padding:40,textAlign:"center",color:"#94A3B8"}}>Chargement des données…</div>:
                 paged.length===0?<div style={{padding:40,textAlign:"center",color:"#94A3B8"}}>Aucune intervention trouvée</div>:
                 paged.map((row,idx)=>{
                  const pc=PRIO[row.priorite]||PRIO[3];
                  const done=created.has(row.id);
                  return(
                    <div key={row.id||idx} className="row-hover" onClick={()=>openAI(row)} style={{display:"grid",gridTemplateColumns:"32px 1fr 70px 55px 160px 88px 130px",padding:"0 14px",borderBottom:"1px solid #F1F5F9",background:idx%2===0?"white":"#FAFBFC",transition:"background 0.1s"}}>
                      <div style={{padding:"9px 5px",fontSize:11,color:"#94A3B8",display:"flex",alignItems:"center",fontWeight:600}}>{row.rang1||"—"}</div>
                      <div style={{padding:"9px 5px",display:"flex",alignItems:"center",minWidth:0}}>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:12,fontWeight:600,color:"#1E293B",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.adherent}</div>
                          <div style={{fontSize:10,color:"#94A3B8",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.naf}</div>
                        </div>
                      </div>
                      <div style={{padding:"9px 5px",fontSize:12,color:"#475569",display:"flex",alignItems:"center"}}>{row.effectif||"—"}</div>
                      <div style={{padding:"9px 5px",display:"flex",alignItems:"center"}}>
                        <span style={{fontSize:10,padding:"2px 6px",borderRadius:4,background:row.anciennete==="Nouvel Adh"?"#EFF6FF":"#F1F5F9",color:row.anciennete==="Nouvel Adh"?"#2563EB":"#64748B",fontWeight:500,whiteSpace:"nowrap"}}>
                          {row.anciennete==="Nouvel Adh"?"Nouveau":"Ancien"}
                        </span>
                      </div>
                      <div style={{padding:"9px 5px",display:"flex",alignItems:"center",gap:5}}>
                        <Avatar name={row.medecin} size={20}/>
                        <div style={{fontSize:11,color:"#374151",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{row.medecin?.split(" ")[0]?.[0]}. {row.medecin?.split(" ").slice(1).join(" ")}</div>
                      </div>
                      <div style={{padding:"9px 5px",fontSize:11,color:"#64748B",display:"flex",alignItems:"center"}}>{row.territoire}</div>
                      <div style={{padding:"9px 5px",display:"flex",alignItems:"center",gap:5}} onClick={e=>e.stopPropagation()}>
                        <span style={{background:pc.bg,color:pc.color,borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,minWidth:20,textAlign:"center"}}>{row.priorite}</span>
                        <button className="btn-create" onClick={e=>{e.stopPropagation();setCreated(p=>new Set([...p,row.id]));showToast(`✓ Intervention créée — ${row.adherent}`);}} style={{padding:"3px 7px",borderRadius:5,border:`1px solid ${done?"#BBF7D0":"#E2E8F0"}`,background:done?"#F0FDF4":"white",color:done?"#15803D":"#64748B",fontSize:10,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.15s"}}>
                          {done?"✓ Créée":"+ Créer"}
                        </button>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* PAGINATION */}
            {totalPages>1&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",borderTop:"1px solid #F1F5F9",background:"#FAFBFC"}}>
              <span style={{fontSize:12,color:"#94A3B8"}}>Page {page} / {totalPages} — {filtered.length.toLocaleString()} résultats</span>
              <div style={{display:"flex",gap:4}}>
                <button onClick={()=>setPage(1)} disabled={page===1} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #E2E8F0",background:page===1?"#F8FAFC":"white",color:page===1?"#CBD5E1":"#475569",cursor:page===1?"default":"pointer",fontSize:12}}>«</button>
                <button onClick={()=>setPage(p=>Math.max(1,p-1))} disabled={page===1} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #E2E8F0",background:page===1?"#F8FAFC":"white",color:page===1?"#CBD5E1":"#475569",cursor:page===1?"default":"pointer",fontSize:12}}>‹ Préc.</button>
                {[...Array(Math.min(5,totalPages))].map((_,i)=>{
                  const p=Math.max(1,Math.min(totalPages-4,page-2))+i;
                  if(p>totalPages)return null;
                  return <button key={p} onClick={()=>setPage(p)} style={{padding:"4px 9px",borderRadius:5,border:"1px solid",borderColor:p===page?"#3B82F6":"#E2E8F0",background:p===page?"#3B82F6":"white",color:p===page?"white":"#475569",cursor:"pointer",fontSize:12,fontWeight:p===page?600:400}}>{p}</button>;
                })}
                <button onClick={()=>setPage(p=>Math.min(totalPages,p+1))} disabled={page===totalPages} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #E2E8F0",background:page===totalPages?"#F8FAFC":"white",color:page===totalPages?"#CBD5E1":"#475569",cursor:page===totalPages?"default":"pointer",fontSize:12}}>Suiv. ›</button>
                <button onClick={()=>setPage(totalPages)} disabled={page===totalPages} style={{padding:"4px 8px",borderRadius:5,border:"1px solid #E2E8F0",background:page===totalPages?"#F8FAFC":"white",color:page===totalPages?"#CBD5E1":"#475569",cursor:page===totalPages?"default":"pointer",fontSize:12}}>»</button>
              </div>
            </div>}
          </div>
        </div>
      </div>

      {/* AI PANEL */}
      {aiOpen&&<div className="ai-panel" style={{width:310,height:"100vh",background:"white",borderLeft:"1px solid #E2E8F0",display:"flex",flexDirection:"column",flexShrink:0}}>
        <div style={{padding:"12px 14px",background:"#1D6AF5",display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:30,height:30,borderRadius:8,background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>✨</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{color:"white",fontWeight:700,fontSize:13}}>Assistant IA</div>
            {selRow&&<div style={{color:"rgba(255,255,255,0.65)",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{selRow.adherent}</div>}
          </div>
          <button onClick={()=>setAiOpen(false)} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.7)",fontSize:18,lineHeight:1}}>✕</button>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:12,display:"flex",flexDirection:"column",gap:8}}>
          {msgs.length===0&&<div style={{textAlign:"center",padding:"16px 8px"}}>
            <div style={{fontSize:28,marginBottom:8}}>🏥</div>
            <div style={{fontSize:13,fontWeight:600,color:"#374151",marginBottom:4}}>Assistant Medtra5</div>
            {!apiKey&&<div style={{background:"#FEF3C7",border:"1px solid #FDE68A",borderRadius:8,padding:"8px 10px",fontSize:11,color:"#92400E",marginBottom:10}}>⚠️ Configurez la clé API via ⚙️</div>}
            <div style={{fontSize:11,color:"#94A3B8",marginBottom:10}}>Cliquez sur une ligne pour analyser une intervention, ou posez une question générale.</div>
            {["Quels sont les adhérents les plus urgents ?","Combien de nouveaux adhérents en P1 ?","Résume les interventions par territoire"].map(q=>(
              <button key={q} onClick={()=>setInput(q)} style={{display:"block",width:"100%",padding:"6px 10px",borderRadius:7,border:"1px solid #E2E8F0",background:"#F8FAFC",color:"#374151",fontSize:11,cursor:"pointer",textAlign:"left",marginBottom:4}}>{q}</button>
            ))}
          </div>}
          {msgs.map((m,i)=>(
            <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
              <div style={{maxWidth:"90%",padding:"8px 11px",borderRadius:10,background:m.role==="user"?"#1D6AF5":"#F1F5F9",color:m.role==="user"?"white":"#374151",fontSize:12,lineHeight:1.6,borderBottomRightRadius:m.role==="user"?3:10,borderBottomLeftRadius:m.role==="assistant"?3:10,whiteSpace:"pre-wrap"}}>{m.content}</div>
            </div>
          ))}
          {aiLoading&&<div style={{display:"flex"}}><div style={{padding:"8px 12px",borderRadius:10,background:"#F1F5F9",fontSize:12,color:"#94A3B8"}}>En réflexion…</div></div>}
          <div ref={endRef}/>
        </div>

        <div style={{padding:"10px 12px",borderTop:"1px solid #F1F5F9"}}>
          <div style={{display:"flex",gap:7,alignItems:"flex-end",background:"#F8FAFC",borderRadius:10,padding:"7px 10px",border:"1px solid #E2E8F0"}}>
            <textarea value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendAI();}}} placeholder="Votre question…" rows={1} style={{flex:1,background:"none",border:"none",outline:"none",fontSize:12,color:"#374151",resize:"none",fontFamily:"inherit",lineHeight:1.5}}/>
            <button onClick={sendAI} disabled={aiLoading||!input.trim()} style={{width:28,height:28,borderRadius:6,background:input.trim()?"#1D6AF5":"#E2E8F0",border:"none",cursor:input.trim()?"pointer":"default",color:"white",fontSize:13,flexShrink:0}}>➤</button>
          </div>
        </div>
      </div>}

      {toast&&<div style={{position:"fixed",bottom:20,left:"50%",transform:"translateX(-50%)",background:"#1E293B",color:"white",padding:"10px 18px",borderRadius:8,fontSize:13,fontWeight:500,boxShadow:"0 4px 24px rgba(0,0,0,0.15)",zIndex:1000,whiteSpace:"nowrap",animation:"fadeUp 0.2s"}}>{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
